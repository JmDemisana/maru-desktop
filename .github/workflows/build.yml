name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build Windows targets (32-bit portable, 64-bit nsis, ARM portable, 64-bit MSIX)
        run: |
          npm run dist -- --win portable --ia32
          npm run dist -- --win nsis --x64
          npm run dist -- --win portable --arm64
          npm run dist -- --win msix --x64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable-ia32
          path: desktop-dist/*ia32*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-x64
          path: desktop-dist/*x64*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable-arm64
          path: desktop-dist/*arm64*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: desktop-dist/*.msix

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build Linux AppImage and deb
        run: npm run dist -- --linux AppImage deb
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: desktop-dist/*.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: desktop-dist/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS DMG (Apple Silicon only)
        run: npm run dist -- --mac dmg --arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: desktop-dist/*-arm64.dmg

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
      - name: Create release notes
        run: |
          cd release-files
          cat > release-notes.md << 'EOF'
          # Maru Desktop ${{ github.ref_name }}

          ## What's Included
          - Windows Portable 32-bit (.exe) - No installation required
          - Windows Installer 64-bit (.exe) - NSIS installer
          - Windows Portable ARM64 (.exe) - For ARM devices
          - Windows Modern Installer (.msix) - MSIX package
          - Linux AppImage (.AppImage) - Universal Linux package
          - Linux Debian (.deb) - For Ubuntu/Debian systems
          - macOS Apple Silicon (.dmg) - For M1/M2/M3+ Macs

          ## Included Applets
          - PhotoServe - Photo layout and print workstation
          - Cup-Cupper-Cuppers - Shuffled-cup duel game
          - Dael or No Dael - Single-player deal game
          - TUP Grade Solver - Grade calculations
          - Options - Desktop settings and themes
          EOF
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Maru Desktop ${{ github.ref_name }}
          body_path: release-files/release-notes.md
          files: |
            release-files/windows-portable-ia32/*.exe
            release-files/windows-nsis-x64/*.exe
            release-files/windows-portable-arm64/*.exe
            release-files/windows-msix/*.msix
            release-files/linux-appimage/*.AppImage
            release-files/linux-deb/*.deb
            release-files/macos-dmg-arm64/*.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}